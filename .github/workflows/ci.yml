name: BW Monitor CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt PyYAML
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Reject generated database and cache files
        run: |
          bad="$(find . -path './.git' -prune -o \( -name '__pycache__' -o -name '*.pyc' -o -name 'bandwidth.db*' -o -name '*.sqlite' -o -name '*.sqlite3' \) -print)"
          test -z "$bad" || { printf '%s\n' "$bad"; exit 1; }

      - name: Validate shell syntax and ShellCheck
        run: |
          while IFS= read -r -d '' file; do
            echo "bash -n $file"
            bash -n "$file"
            shellcheck -x -S warning "$file" || true
          done < <(find . -type f -name '*.sh' -print0)

      - name: Validate Python syntax
        run: |
          python -m py_compile release/*.py deploy/agent/agent.py

      - name: Validate YAML
        run: |
          python - <<'PY_YAML'
          from pathlib import Path
          import yaml
          for path in sorted(Path('ansible').glob('*.yml')) + sorted(Path('.github/workflows').glob('*.yml')):
              yaml.safe_load(path.read_text(encoding='utf-8'))
              print('YAML OK:', path)
          PY_YAML

      - name: Run full release preflight
        run: |
          cd release
          BW_PYTHON_BIN="$(command -v python)" \
          BW_PREFLIGHT_ONLY=1 \
          bash ./install_bw_monitor_v48_12_9.sh

      - name: Verify checksum manifest
        run: |
          sha256sum -c SHA256SUMS
