---
- name: Deploy BW Monitor production server
  hosts: monitors
  become: true
  gather_facts: false

  vars:
    bw_monitor_domain: ""
    bw_monitor_email: ""
    bw_monitor_public_ip: ""
    bw_monitor_port: 8080
    bw_monitor_admin_user: admin
    bw_monitor_admin_password: ""
    bw_monitor_token: ""
    bw_monitor_timezone: Asia/Ho_Chi_Minh
    bw_monitor_backup_db: false
    bw_monitor_recover_stuck: true
    bw_monitor_run_retention_now: false

  pre_tasks:
    - name: Validate monitor deployment variables
      ansible.builtin.assert:
        that:
          - bw_monitor_admin_password | length >= 12
          - (bw_monitor_domain | length == 0) or (bw_monitor_email | length > 3)
        fail_msg: >-
          Set bw_monitor_admin_password to at least 12 characters. When using
          bw_monitor_domain, also set bw_monitor_email.
      no_log: true

  tasks:
    - name: Create temporary deployment directory
      ansible.builtin.file:
        path: /root/bw-monitor-deploy
        state: directory
        owner: root
        group: root
        mode: "0700"

    - name: Copy production deployment files
      ansible.builtin.copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        owner: root
        group: root
        mode: preserve
      loop:
        - { src: "{{ playbook_dir }}/../release/", dest: /root/bw-monitor-deploy/release/ }
        - { src: "{{ playbook_dir }}/../deploy/monitor/", dest: /root/bw-monitor-deploy/deploy/monitor/ }
        - { src: "{{ playbook_dir }}/../requirements.txt", dest: /root/bw-monitor-deploy/requirements.txt }
        - { src: "{{ playbook_dir }}/../VERSION", dest: /root/bw-monitor-deploy/VERSION }

    - name: Build installer argument list
      ansible.builtin.set_fact:
        bw_monitor_install_args: >-
          --port {{ bw_monitor_port }}
          --admin-user {{ bw_monitor_admin_user | quote }}
          --timezone {{ bw_monitor_timezone | quote }}
          {{ ('--domain ' + (bw_monitor_domain | quote) + ' --email ' + (bw_monitor_email | quote)) if (bw_monitor_domain | length > 0) else ('--public-ip ' + (bw_monitor_public_ip | quote)) }}
          {{ '--backup-db' if bw_monitor_backup_db | bool else '' }}
          {{ '--recover-stuck' if bw_monitor_recover_stuck | bool else '' }}
          {{ '--run-retention-now' if bw_monitor_run_retention_now | bool else '' }}

    - name: Run production monitor installer
      ansible.builtin.shell: >-
        /root/bw-monitor-deploy/deploy/monitor/install-monitor.sh
        {{ bw_monitor_install_args }}
      args:
        executable: /bin/bash
      environment:
        BW_ADMIN_PASSWORD: "{{ bw_monitor_admin_password }}"
        BW_MONITOR_TOKEN: "{{ bw_monitor_token }}"
      no_log: true

    - name: Verify Monitor service
      ansible.builtin.command: systemctl is-active bw-monitor.service
      register: monitor_active
      changed_when: false
      failed_when: monitor_active.stdout != 'active'

    - name: Verify retention timer
      ansible.builtin.command: systemctl is-active bw-monitor-retention.timer
      register: retention_active
      changed_when: false
      failed_when: retention_active.stdout != 'active'

    - name: Show monitor status
      ansible.builtin.debug:
        msg:
          - "bw-monitor.service={{ monitor_active.stdout }}"
          - "bw-monitor-retention.timer={{ retention_active.stdout }}"
          - "Credentials: /root/bw-monitor-credentials.env"
